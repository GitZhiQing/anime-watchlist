name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Package portable
        shell: pwsh
        run: |
          $name = "anime-watchlist_${{ github.ref_name }}"
          New-Item -ItemType Directory -Path $name -Force
          Copy-Item "src-tauri\target\release\anime-watchlist.exe" $name
          Copy-Item "src-tauri\dist" "$name\dist" -Recurse
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "anime-watchlist_$tag.zip"
          $repo = "${{ github.repository }}"

          # collect commits since previous tag
          $prevTag = (git tag --sort=-creatordate | Select-Object -Skip 1 -First 1)
          if ($prevTag) {
            $commits = git log "$prevTag..$tag" --pretty="format:- %s (%h)" --no-merges
          } else {
            $commits = git log --pretty="format:- %s (%h)" --no-merges
          }
          $commitList = if ($commits) { ($commits -join "`n") } else { "- 首次发布" }

          $notes = @"
          ## 📦 追番计划 $tag

          基于 Bangumi API 的 Windows 桌面追番软件。

          ### 变更

          $commitList

          ### 使用方式

          下载 zip 解压到任意目录，双击 anime-watchlist.exe 运行（绿色便携，无需安装）。
          "@

          gh release create $tag $zip --repo $repo --title "$tag" --notes "$notes"
