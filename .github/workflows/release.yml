name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Package portable
        shell: pwsh
        run: |
          $name = "anime-watchlist_${{ github.ref_name }}"
          New-Item -ItemType Directory -Path $name -Force
          Copy-Item "src-tauri\target\release\anime-watchlist.exe" $name
          Copy-Item "src-tauri\dist" "$name\dist" -Recurse
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            anime-watchlist_${{ github.ref_name }}.zip
